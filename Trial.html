<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mohit Kothari — Designer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#060607;
  --card:#0f0f12;
  --text:#fff;
  --muted:#aaa;
  --accent:#7c5cff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Syne',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Layout */
section{
  padding:100px 20px;
  max-width:1200px;
  margin:auto;
}

/* Hero */
.hero h1{
  font-size:64px;
  line-height:1.1;
  max-width:800px;
}

.hero p{
  margin-top:20px;
  color:var(--muted);
  max-width:500px;
}

/* Button */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 28px;
  background:var(--accent);
  border-radius:50px;
  text-decoration:none;
  color:#fff;
  transition:.3s;
}

.btn:hover{
  transform:scale(1.05);
}

/* Grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* Featured Project */
.featured{
  grid-column:span 2;
}

/* Card */
.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  transition:.4s;
}

.card:hover{
  transform:translateY(-10px);
}

/* Image */
.proj-img img{
  width:100%;
  height:240px;
  object-fit:cover;
  transition:.4s;
}

.card:hover img{
  transform:scale(1.1);
}

/* Text */
.proj-info{
  padding:20px;
}

.proj-info small{
  color:var(--muted);
}

/* Reveal */
.reveal{
  opacity:0;
  transform:translateY(60px);
  transition:1s;
}

.reveal.active{
  opacity:1;
  transform:none;
}

/* CTA */
.cta{
  text-align:center;
}

.cta h2{
  font-size:42px;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>I help brands stand out through <span style="color:var(--accent)">powerful design</span>.</h1>
  <p>Graphic designer with 5+ years experience creating high-impact visuals, branding, and digital creatives.</p>
  <a href="mailto:mohit.98.kothari@gmail.com" class="btn">Hire Me</a>
</section>

<!-- PORTFOLIO -->
<section class="reveal">
  <h2>Selected Work</h2>
  <div id="portfolioGrid" class="grid"></div>
</section>

<!-- CTA -->
<section class="cta reveal">
  <h2>Let’s build something impactful.</h2>
  <a href="mailto:mohit.98.kothari@gmail.com" class="btn">Start a Project</a>
</section>

<script>

// Reveal
const reveals=document.querySelectorAll(".reveal");
window.addEventListener("scroll",()=>{
  reveals.forEach(el=>{
    if(el.getBoundingClientRect().top < window.innerHeight-100){
      el.classList.add("active");
    }
  });
});

// Behance Sync
const USER="montykothari";
const grid=document.getElementById("portfolioGrid");

async function loadProjects(){
  const res=await fetch(
    `https://api.allorigins.win/get?url=${encodeURIComponent(
      `https://www.behance.net/feeds/user?username=${USER}`
    )}`
  );

  const data=await res.json();
  const parser=new DOMParser();
  const xml=parser.parseFromString(data.contents,"text/xml");

  const items=[...xml.querySelectorAll("item")].slice(0,6);

  const projects=items.map((item,i)=>{
    const title=item.querySelector("title").textContent;
    const link=item.querySelector("link").textContent;
    const desc=item.querySelector("description").textContent;
    const img=desc.match(/<img.*?src="(.*?)"/);

    return{
      title,
      url:link,
      thumb:img?img[1]:"",
      featured:i===0
    }
  });

  render(projects);
}

function render(projects){
  grid.innerHTML=projects.map(p=>`
    <a href="${p.url}" target="_blank" class="card ${p.featured?'featured':''}">
      <div class="proj-img">
        <img src="${p.thumb}" onerror="this.src='https://via.placeholder.com/400'">
      </div>
      <div class="proj-info">
        <strong>${p.title}</strong><br>
        <small>View Case Study</small>
      </div>
    </a>
  `).join("");
}

loadProjects();
setInterval(loadProjects,600000);

</script>

</body>
</html>
